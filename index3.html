<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>별사탕 수집가</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #2c3e50;
            font-family: 'Malgun Gothic', sans-serif;
            user-select: none;
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            pointer-events: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 48px;
            font-weight: bold;
            text-align: center;
            display: none;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
        }
        .restart {
            font-size: 24px;
            margin-top: 20px;
            cursor: pointer;
            padding: 10px 20px;
            background-color: #e74c3c;
            border-radius: 10px;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div id="ui">
        점수: <span id="score">0</span><br>
        생명: <span id="lives">❤️❤️❤️</span>
    </div>
    
    <div id="gameOver">
        게임 오버<br>
        <div class="restart" onclick="location.reload()">다시 시작</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const livesElement = document.getElementById('lives');
        const gameOverScreen = document.getElementById('gameOver');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // 6가지 색상과 각각의 보색 매칭
        const colors = [
            { name: 'Red', code: '#FF6B6B', comp: 'Cyan' },
            { name: 'Cyan', code: '#4ECDC4', comp: 'Red' },
            { name: 'Yellow', code: '#FFE66D', comp: 'Blue' },
            { name: 'Blue', code: '#5A189A', comp: 'Yellow' },
            { name: 'Green', code: '#95D5B2', comp: 'Magenta' },
            { name: 'Magenta', code: '#F72585', comp: 'Green' }
        ];

        let score = 0;
        let lives = 3;
        let isGameOver = false;
        let lastEatenColor = null;

        const keys = {
            ArrowUp: false,
            ArrowDown: false,
            ArrowLeft: false,
            ArrowRight: false
        };

        window.addEventListener('keydown', (e) => {
            if (keys.hasOwnProperty(e.key)) keys[e.key] = true;
        });

        window.addEventListener('keyup', (e) => {
            if (keys.hasOwnProperty(e.key)) keys[e.key] = false;
        });

        // 플레이어 객체 (귀여운 캐릭터)
        const player = {
            x: 150,
            y: canvas.height / 2,
            radius: 25,
            speed: 7
        };

        const candies = [];
        let frameCount = 0;

        function drawStar(cx, cy, spikes, outerRadius, innerRadius, color) {
            let rot = Math.PI / 2 * 3;
            let x = cx;
            let y = cy;
            let step = Math.PI / spikes;

            ctx.beginPath();
            ctx.moveTo(cx, cy - outerRadius);
            for (let i = 0; i < spikes; i++) {
                x = cx + Math.cos(rot) * outerRadius;
                y = cy + Math.sin(rot) * outerRadius;
                ctx.lineTo(x, y);
                rot += step;

                x = cx + Math.cos(rot) * innerRadius;
                y = cy + Math.sin(rot) * innerRadius;
                ctx.lineTo(x, y);
                rot += step;
            }
            ctx.lineTo(cx, cy - outerRadius);
            ctx.closePath();
            ctx.fillStyle = color;
            ctx.fill();
        }

        function drawPlayer() {
            // 몸통
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#f1c40f'; // 노란색 귀여운 몸
            ctx.fill();
            ctx.closePath();

            // 눈
            ctx.beginPath();
            ctx.arc(player.x + 8, player.y - 5, 3, 0, Math.PI * 2);
            ctx.arc(player.x - 2, player.y - 5, 3, 0, Math.PI * 2);
            ctx.fillStyle = '#000';
            ctx.fill();
            ctx.closePath();

            // 볼터치
            ctx.beginPath();
            ctx.arc(player.x + 12, player.y + 2, 4, 0, Math.PI * 2);
            ctx.arc(player.x - 6, player.y + 2, 4, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 105, 180, 0.6)';
            ctx.fill();
            ctx.closePath();

            // 입
            ctx.beginPath();
            ctx.arc(player.x + 3, player.y + 2, 3, 0, Math.PI);
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 1.5;
            ctx.stroke();
            ctx.closePath();
        }

        function updatePlayer() {
            if (keys.ArrowUp && player.y - player.radius > 0) player.y -= player.speed;
            if (keys.ArrowDown && player.y + player.radius < canvas.height) player.y += player.speed;
            if (keys.ArrowLeft && player.x - player.radius > 0) player.x -= player.speed;
            if (keys.ArrowRight && player.x + player.radius < canvas.width) player.x += player.speed;
        }

        function handleCandies() {
            // 별사탕 생성
            if (frameCount % 40 === 0) {
                const randomColor = colors[Math.floor(Math.random() * colors.length)];
                candies.push({
                    x: canvas.width + 30,
                    y: Math.random() * (canvas.height - 60) + 30,
                    radius: 15,
                    speed: Math.random() * 3 + 3,
                    colorInfo: randomColor
                });
            }

            for (let i = candies.length - 1; i >= 0; i--) {
                const candy = candies[i];
                candy.x -= candy.speed; // 왼쪽으로 이동 (횡스크롤)

                drawStar(candy.x, candy.y, 5, candy.radius, candy.radius / 2, candy.colorInfo.code);

                // 충돌 판정
                const dx = player.x - candy.x;
                const dy = player.y - candy.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < player.radius + candy.radius - 5) {
                    if (lastEatenColor && lastEatenColor.comp === candy.colorInfo.name) {
                        // 보색을 먹었을 때 생명 감소
                        lives--;
                        updateLivesDisplay();
                        if (lives <= 0) isGameOver = true;
                    } else {
                        // 정상적으로 먹었을 때 점수 증가
                        score += 100;
                        scoreElement.innerText = score;
                    }
                    
                    lastEatenColor = candy.colorInfo;
                    candies.splice(i, 1);
                } else if (candy.x < -30) {
                    // 화면 밖으로 나간 별사탕 제거
                    candies.splice(i, 1);
                }
            }
        }

        function updateLivesDisplay() {
            let hearts = '';
            for (let i = 0; i < lives; i++) hearts += '❤️';
            livesElement.innerText = hearts;
        }

        function gameLoop() {
            if (isGameOver) {
                gameOverScreen.style.display = 'block';
                return;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            updatePlayer();
            drawPlayer();
            handleCandies();

            frameCount++;
            requestAnimationFrame(gameLoop);
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        gameLoop();
    </script>
</body>
</html>
